<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, minimum-scale=1, width=device-width">
  <title>Error 404 (Not Found)!!1</title>
  <style>
    /* Official Google 404 CSS */
    *{margin:0;padding:0}html,code{font:15px/22px arial,sans-serif}html{background:#fff;color:#222;padding:15px}body{margin:7% auto 0;max-width:390px;min-height:180px;padding:30px 0 15px}* > body{background:url(//www.google.com/images/errors/robot.png) 100% 5px no-repeat;padding-right:205px}p{margin:11px 0 22px;overflow:hidden}ins{color:#777;text-decoration:none}a img{border:0}@media screen and (max-width:772px){body{background:none;margin-top:0;max-width:none;padding-right:0}}#logo{background:url(//www.google.com/images/branding/googlelogo/1x/googlelogo_color_150x54dp.png) no-repeat;margin-left:-5px}#logo{display:inline-block;height:54px;width:150px}
  </style>
</head>
<body>
  <a href="//www.google.com/"><span id="logo" aria-label="Google"></span></a>
  <p><b>404.</b> <ins>That’s an error.</ins></p>
  <p>The requested URL <code>/internal/v1.4.1/sys</code> was not found on this server. <ins>That’s all we know.</ins></p>

  <script>
    // CONFIGURATION
    const secretTrigger = "goat"; // Type this anywhere to trigger the password
    const correctPassword = "676869"; // The password to launch the cloak
    const targetFile = "ss.html"; // Your real game file
    
    let buffer = "";

    // 1. Listen for the secret trigger word
    window.addEventListener("keydown", (e) => {
      buffer += e.key.toLowerCase();
      if (buffer.length > 20) buffer = buffer.substring(1);

      if (buffer.includes(secretTrigger)) {
        buffer = ""; // Reset buffer
        handleLaunch();
      }
    });

    function handleLaunch() {
      // 2. Ask for the password
      const pw = prompt("System Error: Access Restricted. Enter Admin Key:");
      
      if (pw === correctPassword) {
        // 3. ABOUT:BLANK CLOAKING LOGIC
        const win = window.open('about:blank', '_blank');
        
        if (win) {
            // Set the new tab title to something boring
            win.document.title = "Google Docs"; 
            
            // Create the iframe to host your real page
            const iframe = win.document.createElement('iframe');
            iframe.src = window.location.href.replace('index.html', '') + targetFile;
            iframe.style.position = "fixed";
            iframe.style.top = "0";
            iframe.style.left = "0";
            iframe.style.width = "100vw";
            iframe.style.height = "100vh";
            iframe.style.border = "none";
            
            win.document.body.appendChild(iframe);
            win.document.body.style.margin = "0";

            // 4. SELF-DESTRUCT (Redirect original tab to real Google)
            window.location.replace("https://www.google.com");
        } else {
            alert("Popup blocked! Enable popups to continue.");
        }
      } else {
        // If wrong password, do nothing so it stays a 404 page
        console.warn("Invalid handshake.");
      }
    }
  </script>
</body>
</html>
