    .tab-btn {

        font-weight: bold;

        color: #01061c;
    }

    #button-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        padding: 20px;

    .button {

        height: 180px;
        background-color: #000;

        background-position: center;
        border: 3px solid white;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        transition: transform 0.2s, border-color 0.2s;
        overflow: hidden;
    }

    .button:hover {
        transform: scale(1.05);
        border-color: #3391ff;
    }

    .button span {
        background: rgba(0, 0, 0, 0.7);
        width: 100%;
        padding: 5px 0;
        font-size: 12px;
        font-weight: bold;
    }

    #game-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: black;
        z-index: 1000;
    }

    #game-frame { width: 100%; height: 100%; border: none; }

    #close-btn {
        position: absolute;
        top: 10px; right: 20px;
        background: red; color: white;
        border: none; padding: 10px 15px;
        cursor: pointer; font-weight: bold;
        z-index: 1001;

    const container = document.getElementById('button-container');
    const navTabs = document.getElementById('nav-tabs');

    function init() {
        gameFiles.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
        createTabs();
        showCategory('All');
    }

    function createTabs() {
        const letters = ['All', ...new Set(gameFiles.map(f => f[0].toUpperCase()))].sort();
        letters.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.innerText = letter;
            btn.onclick = () => showCategory(letter, btn);
            navTabs.appendChild(btn);
        });
    }

    function showCategory(cat, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        container.innerHTML = '';
        const filtered = cat === 'All' ? gameFiles : gameFiles.filter(f => f[0].toUpperCase() === cat);
        
        filtered.forEach(file => {
            const gameName = file.split('.')[0].replace(/([A-Z])/g, ' $1').replace(/-/g, ' ');
            const div = document.createElement('div');
            div.className = 'button';
            div.innerHTML = `<span>${gameName.toUpperCase()}</span>`;
            div.onclick = () => launchGame(file);
            container.appendChild(div);
        });
    }

    function filterGames() {
        const term = document.getElementById('search-bar').value.toLowerCase();
        container.innerHTML = '';
        gameFiles.filter(f => f.toLowerCase().includes(term)).forEach(file => {
            const div = document.createElement('div');
            div.className = 'button';
            div.innerHTML = `<span>${file.split('.')[0].toUpperCase()}</span>`;
            div.onclick = () => launchGame(file);
            container.appendChild(div);
        });
    }

    function launchGame(file) {
        // Point to your /offline/ directory
        document.getElementById('game-frame').src = "offline/" + file;
        document.getElementById('game-overlay').style.display = 'block';
    }

    function closeGame() {
        document.getElementById('game-overlay').style.display = 'none';
        document.getElementById('game-frame').src = '';
    }

    window.addEventListener('keydown', (e) => { if(e.key === "Escape") closeGame(); });

    init();
